name: "InterNACHI / ASHI Standard"
country_code: "US"
published: true

categories:
  - name: "Roof"
    items:
      - name: "Roof covering (shingles, tiles, metal) — condition, age, damage"
        severity: critical
        allows_photo: true
      - name: "Flashing (valleys, chimneys, walls) — seal, rust, gaps"
        severity: critical
        allows_photo: true
      - name: "Gutters & downspouts — clogs, damage, slope, discharge"
        severity: minor
        allows_photo: true
      - name: "Skylights — seal, cracks, operation"
        severity: minor
        allows_photo: true
      - name: "Chimney exterior — cracks, mortar, cap, spark arrestor"
        severity: minor
        allows_photo: true
      - name: "Roof ventilation (soffit vents, ridge vents, fans)"
        severity: minor
        allows_photo: false
      - name: "Active roof leaks (stains on ceilings, water marks)"
        severity: critical
        allows_photo: true
      - name: "Ice damming evidence (northern climates)"
        severity: major
        allows_photo: true

  - name: "Exterior"
    items:
      - name: "Wall covering (siding, brick, stucco) — cracks, rot, damage"
