---
es:
  report_mailer:
    send_report:
      subject: "Su Informe de Inspección de Vivienda — %{property_address}"
      greeting: "Estimado/a %{client_name},"
      body: |
        Su informe de inspección de vivienda para %{property_address} está completo y se adjunta a este correo.

        Por favor, revise el informe y contacte a su inspector si tiene alguna pregunta.

        También se ha enviado una copia a su inspector (%{inspector_email}).
      closing: "Gracias por elegir HomeInspectPro."
