# i18n-tasks configuration
# See https://github.com/glebm/i18n-tasks#configuration

base_locale: en
data:
  adapter: file_system
  read:
    - config/locales/%{locale}.yml
    - config/locales/**/*.%{locale}.yml
  write:
    - config/locales/%{locale}.yml
    - config/locales/**/*.%{locale}.yml

# Ignore Devise translations (provided by gem, used automatically)
# But track our custom devise.views.* translations
ignore:
  - devise.confirmations.*
  - devise.failure.*
  - devise.mailer.*
  - devise.omniauth_callbacks.*
  - devise.passwords.*
  - devise.registrations.*
  - devise.sessions.*
  - devise.unlocks.*
  - errors.messages.*
